<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      background: #1e1e1e;
      color: #cccccc;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header-bar {
      background: #252526;
      border-bottom: 1px solid #3c3c3c;
      height: 40px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 0 12px;
    }
    .top-tabs {
      background: #252526;
      border-bottom: 1px solid #3c3c3c;
      height: 36px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
    }
    .tab-content-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .tab-panel {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }
    .tab-panel.active {
      display: flex;
    }
    .phase-indicator {
      background: #1e1e1e;
      border-bottom: 1px solid #3c3c3c;
      padding: 6px 12px;
      flex-shrink: 0;
    }
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      min-height: 0;
      background: #1e1e1e;
    }
    .main-content::-webkit-scrollbar {
      width: 8px;
    }
    .main-content::-webkit-scrollbar-thumb {
      background: #424242;
      border-radius: 4px;
    }
    .bottom-tabs {
      display: flex;
      align-items: center;
      padding: 0 8px;
      background: #252526;
      border-top: 1px solid #3c3c3c;
      height: 32px;
      flex-shrink: 0;
      gap: 4px;
    }
    .input-container {
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      padding: 8px 12px 12px;
      background: #252526;
    }
    .input-wrapper {
      background: #3c3c3c;
      border: 1px solid #3c3c3c;
      border-radius: 6px;
      padding: 8px;
    }
    textarea {
      width: 100%;
      background: transparent;
      border: none;
      color: #cccccc;
      resize: none;
      font-family: inherit;
      font-size: 13px;
    }
    textarea:focus {
      outline: none;
    }
    .message {
      background: #252526;
      border: 1px solid #3c3c3c;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="header-bar">Header Bar</div>
  <div class="top-tabs">Top Tabs</div>
  <div class="tab-content-wrapper">
    <div class="tab-panel active">
      <div class="phase-indicator">Phase Indicator</div>
      <div class="main-content">
        <div class="message">Message 1</div>
        <div class="message">Message 2</div>
        <div class="message">Message 3</div>
        <div class="message">Message 4</div>
        <div class="message">Message 5</div>
        <div class="message">Message 6</div>
        <div class="message">Message 7</div>
        <div class="message">Message 8</div>
        <div class="message">Message 9</div>
        <div class="message">Message 10</div>
        <div class="message">Message 11</div>
        <div class="message">Message 12</div>
        <div class="message">Message 13</div>
        <div class="message">Message 14</div>
        <div class="message">Message 15</div>
      </div>
      <div class="bottom-tabs">Bottom Tabs</div>
      <div class="input-container">
        <div class="input-wrapper">
          <textarea rows="3" placeholder="输入消息..."></textarea>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
