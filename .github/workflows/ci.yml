name: 持续集成

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.97.0"

jobs:
  validate:
    name: 检查与测试
    runs-on: ubuntu-22.04
    timeout-minutes: 35
    steps:
      - name: 检出代码
        uses: actions/checkout@v7

      - name: 安装 Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: 安装前端依赖
        run: npm --prefix web ci

      - name: 前端类型检查
        run: npm --prefix web run check

      - name: 前端契约测试
        run: npm --prefix web run test

      - name: 前端生产构建
        run: npm --prefix web run build

      - name: 前端生产依赖安全检查
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if npm --prefix web audit --omit=dev; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "前端依赖安全检查连续失败 3 次。" >&2
              exit 1
            fi
            sleep $((attempt * 10))
          done

      - name: 安装 Rust
        run: rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component clippy && rustup default "$RUST_TOOLCHAIN"

      - name: 缓存 Rust 构建产物
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-ubuntu-22.04-rust-1.97

      - name: 安装 Linux 桌面依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Rust 编译检查
        run: cargo check --workspace --all-targets --locked

      - name: Rust Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Rust 全量测试
        run: cargo test --workspace --locked

      - name: Rust 依赖安全检查
        run: |
          cargo install cargo-audit --version 0.22.2 --locked
          cargo audit

  windows-desktop:
    name: Windows 桌面进程策略
    runs-on: windows-2022
    timeout-minutes: 20
    steps:
      - name: 检出代码
        uses: actions/checkout@v7

      - name: 安装 Rust
        run: rustup toolchain install "$env:RUST_TOOLCHAIN" --profile minimal && rustup default "$env:RUST_TOOLCHAIN"

      - name: 缓存 Rust 构建产物
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-windows-2022-rust-1.97

      - name: 验证 Windows 子进程与桌面宿主
        run: |
          cargo test -p magi-core --test host_path --locked
          cargo test -p magi-workspace native_workspace_registration_keeps_authoritative_path_ref --locked
          cargo test -p magi-process --all-targets --locked
          cargo test -p magi-permissions --all-targets --locked
          cargo test -p magi-tool-runtime process_inspect_reports_current_process --locked
          cargo test -p magi-tool-runtime shell_path_parser_tests --locked
          cargo test -p magi-tool-runtime shell_argument_matches_selected_shell_dialect --locked
          cargo test -p magi-tool-runtime shell_exec_accepts_shell_program_with_arguments --locked
          cargo test -p magi-tool-runtime builtins_use_context_working_directory_for_relative_inputs --locked
          cargo test -p magi-api path_ref --locked
          cargo check -p magi-daemon --all-targets --locked
