name: 持续集成

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: 检查与测试
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: 安装前端依赖
        run: npm --prefix web ci

      - name: 前端类型检查
        run: npm --prefix web run check

      - name: 前端契约测试
        run: npm --prefix web run test

      - name: 前端生产构建
        run: npm --prefix web run build

      - name: 前端生产依赖安全检查
        run: npm --prefix web audit --omit=dev

      - name: 安装 Rust
        run: rustup toolchain install stable --profile minimal --component clippy && rustup default stable

      - name: 安装 Linux 桌面依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Rust 编译检查
        run: cargo check --workspace --all-targets --locked

      - name: Rust Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Rust 全量测试
        run: cargo test --workspace --all-targets --locked

      - name: Rust 依赖安全检查
        run: |
          cargo install cargo-audit --version 0.22.2 --locked
          cargo audit

  windows-desktop:
    name: Windows 桌面进程策略
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 验证 Windows 子进程与桌面宿主
        run: |
          cargo test -p magi-process --all-targets --locked
          cargo check -p magi-daemon --all-targets --locked
