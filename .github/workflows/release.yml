name: 发布构建

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  TAURI_CLI_VERSION: "2.11.4"

jobs:
  build-web:
    name: 构建前端资源
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 校验构建输入不含本地运行时配置
        shell: bash
        run: |
          set -euo pipefail
          forbidden_files="$(find . -path './.git' -prune -o -path './target' -prune -o -path './web/node_modules' -prune -o -type f \( -name 'settings.json' -o -name '.env' -o -name '.env.*' \) -print)"
          if [ -n "$forbidden_files" ]; then
            echo "构建输入包含不应进入发布流程的本地配置文件：" >&2
            printf '%s\n' "$forbidden_files" >&2
            exit 1
          fi
          if [ -d "$HOME/.magi" ]; then
            echo "构建环境检测到本地 Magi 运行时目录，拒绝继续打包。" >&2
            exit 1
          fi

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: 安装前端依赖
        run: npm --prefix web ci

      - name: 校验并构建前端
        run: |
          npm --prefix web run check
          npm --prefix web run build

      - name: 上传前端资源
        uses: actions/upload-artifact@v4
        with:
          name: magi-web-dist
          path: web/dist
          if-no-files-found: error

  package-desktop:
    name: 打包 ${{ matrix.platform }}
    needs: build-web
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            runner: macos-latest
            bundles: dmg
            artifact_paths: target/release/bundle/dmg/*.dmg
          - platform: linux
            runner: ubuntu-22.04
            bundles: appimage,deb
            artifact_paths: |
              target/release/bundle/appimage/*.AppImage
              target/release/bundle/deb/*.deb
          - platform: windows
            runner: windows-latest
            bundles: nsis
            artifact_paths: target/release/bundle/nsis/*.exe

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 校验构建输入不含本地运行时配置
        shell: bash
        run: |
          set -euo pipefail
          forbidden_files="$(find . -path './.git' -prune -o -path './target' -prune -o -path './web/node_modules' -prune -o -type f \( -name 'settings.json' -o -name '.env' -o -name '.env.*' \) -print)"
          if [ -n "$forbidden_files" ]; then
            echo "构建输入包含不应进入发布流程的本地配置文件：" >&2
            printf '%s\n' "$forbidden_files" >&2
            exit 1
          fi
          if [ -d "$HOME/.magi" ]; then
            echo "构建环境检测到本地 Magi 运行时目录，拒绝继续打包。" >&2
            exit 1
          fi

      - name: 下载前端资源
        uses: actions/download-artifact@v4
        with:
          name: magi-web-dist
          path: web/dist

      - name: 校验前端资源不含本地运行时配置
        shell: bash
        run: |
          set -euo pipefail
          forbidden_files="$(find web/dist -type f \( -name 'settings.json' -o -name '.env' -o -name '.env.*' \) -print)"
          if [ -n "$forbidden_files" ]; then
            echo "前端发布资源包含本地配置文件：" >&2
            printf '%s\n' "$forbidden_files" >&2
            exit 1
          fi

      - name: 安装 Linux 桌面依赖
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 构建产物
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: desktop-${{ matrix.platform }}

      - name: 安装 Tauri CLI
        run: cargo install tauri-cli --version ${{ env.TAURI_CLI_VERSION }} --locked

      - name: 校验桌面宿主
        run: cargo test -p magi-desktop --all-targets --locked

      - name: 构建桌面安装包
        run: cargo tauri build --ci --bundles "${{ matrix.bundles }}" -- --locked

      - name: 校验安装包
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.platform }}" in
            macos)
              shopt -s nullglob
              assets=(target/release/bundle/dmg/*.dmg)
              test "${#assets[@]}" -eq 1
              test -s "${assets[0]}"
              mount_dir="$(mktemp -d)"
              device="$(hdiutil attach -nobrowse -readonly -mountpoint "$mount_dir" "${assets[0]}" | awk '/^\/dev\// {print $1; exit}')"
              trap 'hdiutil detach "$device" >/dev/null 2>&1 || true; rmdir "$mount_dir" 2>/dev/null || true' EXIT
              test -n "$device"
              test -x "$mount_dir/Magi.app/Contents/MacOS/Magi"
              test -f "$mount_dir/Magi.app/Contents/Resources/web/dist/web.html"
              if find "$mount_dir/Magi.app" -type f \( -name 'magi-daemon-app*' -o -name 'start-magi*' \) | grep -q .; then
                echo "macOS 安装包暴露了旧技术入口" >&2
                exit 1
              fi
              hdiutil detach "$device" >/dev/null
              rmdir "$mount_dir"
              trap - EXIT
              ;;
            linux)
              shopt -s nullglob
              appimages=(target/release/bundle/appimage/*.AppImage)
              debs=(target/release/bundle/deb/*.deb)
              test "${#appimages[@]}" -eq 1
              test "${#debs[@]}" -eq 1
              test -s "${appimages[0]}"
              test -s "${debs[0]}"
              ;;
            windows)
              shopt -s nullglob
              installers=(target/release/bundle/nsis/*.exe)
              test "${#installers[@]}" -eq 1
              test -s "${installers[0]}"
              ;;
            *)
              echo "不支持的平台：${{ matrix.platform }}" >&2
              exit 1
              ;;
          esac

          if find target/release/bundle -type f \( -name 'magi-daemon-app*' -o -name 'start-magi*' \) | grep -q .; then
            echo "桌面安装包暴露了旧技术入口" >&2
            exit 1
          fi

      - name: 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: magi-bundle-${{ matrix.platform }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error

  publish-release:
    name: 发布 GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: package-desktop
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 收集三平台安装包
        uses: actions/download-artifact@v4
        with:
          pattern: magi-bundle-*
          path: dist/release-assets
          merge-multiple: true

      - name: 校验发布文件
        run: |
          set -euo pipefail
          macos_assets=()
          linux_appimages=()
          linux_debs=()
          windows_installers=()
          while IFS= read -r file; do macos_assets+=("$file"); done < <(find dist/release-assets -type f -name '*.dmg' -print)
          while IFS= read -r file; do linux_appimages+=("$file"); done < <(find dist/release-assets -type f -name '*.AppImage' -print)
          while IFS= read -r file; do linux_debs+=("$file"); done < <(find dist/release-assets -type f -name '*.deb' -print)
          while IFS= read -r file; do windows_installers+=("$file"); done < <(find dist/release-assets -type f -name '*.exe' -print)

          test "${#macos_assets[@]}" -eq 1
          test "${#linux_appimages[@]}" -eq 1
          test "${#linux_debs[@]}" -eq 1
          test "${#windows_installers[@]}" -eq 1
          mkdir -p dist/release-assets/normalized
          cp "${macos_assets[0]}" "dist/release-assets/normalized/$(basename "${macos_assets[0]}")"
          cp "${linux_appimages[0]}" "dist/release-assets/normalized/$(basename "${linux_appimages[0]}")"
          cp "${linux_debs[0]}" "dist/release-assets/normalized/$(basename "${linux_debs[0]}")"
          cp "${windows_installers[0]}" "dist/release-assets/normalized/$(basename "${windows_installers[0]}")"
          test -s dist/release-assets/normalized/*.dmg
          test -s dist/release-assets/normalized/*.AppImage
          test -s dist/release-assets/normalized/*.deb
          test -s dist/release-assets/normalized/*.exe
          ls -lh dist/release-assets/normalized

      - name: 生成发布说明
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          commit="${GITHUB_SHA}"
          generated_at="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          release_kind="正式版"
          if [[ "$tag" =~ (test|alpha|beta|rc) ]]; then
            release_kind="测试版"
          fi

          previous_tag="$(git describe --tags --abbrev=0 "${commit}^" 2>/dev/null || true)"
          if [ -n "$previous_tag" ]; then
            change_title="自 $previous_tag 以来的变更"
            git log --pretty='- %s (%h)' "$previous_tag..$commit" > dist/release-changes.md
          else
            change_title="最近变更"
            git log --pretty='- %s (%h)' -n 50 "$commit" > dist/release-changes.md
          fi
          if [ ! -s dist/release-changes.md ]; then
            echo "- 本次发布没有检测到新的提交摘要。" > dist/release-changes.md
          fi

          macos_asset="$(basename "$(find dist/release-assets/normalized -maxdepth 1 -name '*.dmg' -print -quit)")"
          linux_appimage="$(basename "$(find dist/release-assets/normalized -maxdepth 1 -name '*.AppImage' -print -quit)")"
          linux_deb="$(basename "$(find dist/release-assets/normalized -maxdepth 1 -name '*.deb' -print -quit)")"
          windows_installer="$(basename "$(find dist/release-assets/normalized -maxdepth 1 -name '*.exe' -print -quit)")"

          {
            echo "# Magi $tag"
            echo
            echo "版本类型：$release_kind"
            echo
            echo "## 下载"
            echo
            echo "- macOS：\`$macos_asset\`"
            echo "- Linux AppImage：\`$linux_appimage\`"
            echo "- Linux Deb：\`$linux_deb\`"
            echo "- Windows NSIS：\`$windows_installer\`"
            echo
            echo "## 运行方式"
            echo
            echo "安装并启动 Magi 桌面端后，应用会在同一进程内启动唯一 daemon，并打开桌面工作台。关闭主窗口只会隐藏到系统托盘；从托盘选择“退出 Magi”才会停止服务并退出。"
            echo
            echo "桌面窗口、本机浏览器、局域网设备和公网隧道访问的是同一个 Magi 运行实例、工作区、会话与任务状态。"
            echo
            if [ "$release_kind" = "测试版" ]; then
              echo "## 测试版提示"
              echo
              echo "当前测试包默认不做商业签名和公证。macOS 首次打开可能需要右键打开，Windows 可能出现 SmartScreen 提示。"
              echo
            fi
            echo "## $change_title"
            echo
            cat dist/release-changes.md
            echo
            echo "## 构建信息"
            echo
            echo "- Tag：\`$tag\`"
            echo "- Commit：\`$commit\`"
            echo "- 生成时间：$generated_at"
          } > dist/release-notes.md

      - name: 创建 Release 并上传产物
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Magi ${{ github.ref_name }}
          body_path: dist/release-notes.md
          prerelease: ${{ contains(github.ref_name, 'test') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: dist/release-assets/normalized/*
          fail_on_unmatched_files: true
