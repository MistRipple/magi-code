<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Code Block Test</title>
  <link rel="stylesheet" href="src/ui/webview/styles/design-system.css">
  <link rel="stylesheet" href="src/ui/webview/styles/base.css">
  <link rel="stylesheet" href="src/ui/webview/styles/components/panels.css">
  <style>
    body {
      padding: 20px;
      background: #1e1e1e;
      color: #d4d4d4;
    }
    .test-section {
      margin-bottom: 40px;
    }
    h2 {
      color: #569cd6;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="test-section">
    <h2>测试1: 基础代码块</h2>
    <div id="test1"></div>
  </div>

  <div class="test-section">
    <h2>测试2: 带文件路径的代码块</h2>
    <div id="test2"></div>
  </div>

  <div class="test-section">
    <h2>测试3: 带行号的代码块</h2>
    <div id="test3"></div>
  </div>

  <script type="module">
    import { renderCodeBlock } from './src/ui/webview/js/ui/renderers/code-block-renderer.js';
    import { registerGlobalFunctions } from './src/ui/webview/js/ui/renderers/components.js';

    // 注册全局函数
    registerGlobalFunctions();

    // 测试1: 基础代码块
    const test1Html = renderCodeBlock({
      code: `"显示数据库相关的 MCP 工具"
"列出前端开发的技能"`,
      language: 'text',
      showCopyButton: true
    });
    document.getElementById('test1').innerHTML = test1Html;

    // 测试2: 带文件路径
    const test2Html = renderCodeBlock({
      code: `function example() {
  console.log("Hello World");
  return true;
}`,
      language: 'javascript',
      filepath: 'src/example.js',
      showCopyButton: true,
      showApplyButton: true
    });
    document.getElementById('test2').innerHTML = test2Html;

    // 测试3: 带行号
    const test3Html = renderCodeBlock({
      code: `import React from 'react';

function Component() {
  return (
    <div>
      <h1>Title</h1>
      <p>Content</p>
    </div>
  );
}

export default Component;`,
      language: 'jsx',
      showLineNumbers: true,
      showCopyButton: true
    });
    document.getElementById('test3').innerHTML = test3Html;
  </script>
</body>
</html>
